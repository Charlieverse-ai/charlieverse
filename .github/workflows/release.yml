name: Release to PyPI

on:
  push:
    tags: ['v*']

jobs:
  pypi-publish:
    name: upload release to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: "Install uv"
        uses: astral-sh/setup-uv@v7.6.0
        with:
          version: "0.10.12"
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: charlieverse-*
          path: dist
          merge-multiple: true
      - name: Publish to PyPi
        run: uv publish -v dist/*